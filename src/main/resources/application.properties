spring.application.name=spring-alexandria-library

#data source
spring.datasource.url=jdbc:mysql://localhost:3306/library
spring.datasource.username=root
spring.datasource.password=password


## Hibernate Properties
# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

# Hibernate dal auto(create(butta giù il DB e lo ricrea), create-drop, validate, update, none)
spring.jpa.hibernate.ddl-auto = create

# Data Formatting
spring.mvc.format.date=yyyy-MM-ddl
spring.mvc.format.date-time=yyyy-MM-dd HH:mm:ss
spring.mvc.format.time=HH:mm:ss

#Impostazioni aggiuntive, utili per il testing(rimuoviamole poi)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true