<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <div th:replace="~{fragments/resources :: headTags}"></div>
    <title>Books</title>
</head>

<body>
    <nav th:replace="~{fragments/navbar :: navbar('books')}"></nav>
    <main class="container py-4">
        <h1>Books</h1>
        <hr />

        <div class="mb-3 d-flex">
            <a th:href="@{/books/create}" class="me-auto btn btn-outline-primary btn-sm">
                Create new book
            </a>
        </div>

        <section class="row">
            <div class="col-12">
                <table class="table" th:if="${books.size() > 0}">
                    <thead>
                        <tr>
                            <th>ISBN</th>
                            <th>Title</th>
                            <th>Author</th>
                            <th>Publisher</th>
                            <th>Date</th>
                            <th>Copies</th>
                            <th></th>
                            <th></th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${books}" th:object="${book}">
                            <td>[[*{isbn}]]</td>
                            <td>[[*{title}]]</td>
                            <td>[[*{author}]]</td>
                            <td>[[*{publisher}]]</td>
                            <td>[[*{publicationDate}]]</td>
                            <td>[[*{numberOfCopies}]]</td>
                            <td>
                                <a th:href="@{/books/{id}/borrow(id=*{id})}" class="btn btn-sm btn-outline-success">
                                    <i class="fa-solid fa-book-open"></i>Borrow
                            </td>
                            <td>
                                <a th:href="@{/books/{id}(id=*{id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-book"></i>Details
                                </a>
                            </td>
                            <td>
                                <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-outline-warning btn-sm">
                                    <i class="fa-regular fa-pen-to-square"></i>Edit
                                </a>
                            </td>
                            <td>
                                <!-- Form senza modale , con semplice "button" -->
                                <!-- <form action="#" th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"><i class="fa-solid fa-trash"></i></button>
                                </form> -->

                                <!-- bottone che fa partire la modale -->
                                <button type="button" class="btn btn-outline-danger btn-sm" data-bs-toggle="modal"
                                    th:data-bs-target="'#delete-modal-' + ${book.id}"><i
                                        class="fa-solid fa-trash"></i>Delete</button>
                                <!-- ##B:Modale che appare solo dopo il click sul relativo bottone di Delete -->
                                <div class="modal fade" th:id="'delete-modal-' + ${book.id}" tabindex="-1"
                                    aria-labelledby="delete-model" aria-hidden="true">
                                    <div class="modal-dialog modal-dialog modal-dialog-centered">
                                        <div class="modal-content">
                                        <div class="modal-header">
                                            <h1 class="modal-title fs-5" id="exampleModalLabel">
                                                Deleting "[[${book.title}]]"
                                            </h1>
                                            <button type="button" class="btn-close" data-bs-dismiss="modal"
                                            aria-label="Close"></button>
                                        </div>
                                            <div class="modal-body">
                                                Are you sure you want to dellete the book with title
                                                <strong>"[[${book.title}]]"</strong>
                                            </div>
                                            <div class="modal-footer">
                                                <!-- bototone da cliccare senza la modale senza effetti -->
                                                <button type="button" class="btn btn-outline-secondary"
                                                    data-bs-dismiss="modal">Close</button>
                                                <!-- vero bottone della modale che fa partire la nostra  action di cancellazione chiamiamo il metodo delete   -->
                                                 <form class="d-inline-block" th:action="@{/books/delete/{id}(id=${book.id})}" method="post">
                                                     <button type="submit" class="btn btn-outline-danger">
                                                        Delete
                                                    </button>
                                                 </form>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>

                <p th:text="No books available at the moment .... sorry" th:unless="${books.size() > 0}"></p>

            </div>


        </section>


    </main>
    <div th:replace="~{fragments/resources :: scripts}"></div>
</body>

</html>
