<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">

<head>
    <th:block th:replace="~{fragments/resources :: headTags}"></th:block>
</head>

<body>
    <header>
        <nav th:replace="~{fragments/navbar :: navbar('borrowings')}"></nav>
    </header>

    <main class="container py-4">
        <div class="row">
            <div class="col-12">
                <th:block>
                    <h1 class="py-4 mb-2 text-center">
                        Borrowing the book: "[[${borrowing.book.title}]]"
                        <br>
                        by "[[${borrowing.book.author}]]"
                    </h1>
                    <div class="row justify-content-center">
                        <div class="col-8">
                            <form id="book-form"th:object="${borrowing}" th:action="${edit} ? @{/borrowings/edit/{id}(id=${borrowing.id})} : @{/borrowings/create}" method="post">

                                <input type="hidden" th:field="*{book}" id="linked-book">

                                <div class="mb-3">
                                    <label class="form-label" for="borrowing-date">Borrowing date:</label>
                                    <input class="form-control" type="date" id="borrowing-date"
                                        th:field="*{borrowingDate}" th:errorClass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('borrowingDate')}">
                                        <ul>
                                            <li th:each="error : ${#fields.errors('borrowingDate')}" th:text="${error}">
                                            </li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" for="return-date">Return date:</label>
                                    <input class="form-control" type="date" id="return-date" th:field="*{returnDate}"
                                        th:errorClass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('returnDate')}">
                                        <ul>
                                            <li th:each="error : ${#fields.errors('returnDate')}" th:text="${error}">
                                            </li>
                                        </ul>
                                    </div>
                                </div>


                                <div class="mb-3">
                                    <label class="form-label" for="notes">Notes:</label>
                                    <textarea id="notes" class="form-control" th:field="*{notes}"
                                        th:errorClass="is-invalid"></textarea>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('notes')}">
                                        <ul>
                                            <li th:each="error : ${#fields.errors('notes')}" th:text="${error}"></li>
                                        </ul>
                                    </div>
                                </div>

                                <div class="mb-3 d-flex justify-content-between">
                                    <input type="submit" class="btn btn-outline-primary" value="Save">
                                    <input type="reset" class="btn btn-outline-warning" value="Reset all fields">
                                </div>

                            </form>
                        </div>
                    </div>
                </th:block>
            </div>
        </div>
    </main>
    <div th:replace="~{fragments/resources :: scripts}"></div>
</body>

</html>
